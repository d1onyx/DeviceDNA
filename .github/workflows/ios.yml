# iOS build for the Compose Multiplatform app.
#
# Produces artifacts you can inspect from any OS:
#   • DeviceDNAApp-unsigned.ipa  — UNSIGNED real-device build (arm64), for sideloading
#     tools that do their own signing (AltStore/AltServer, Sideloadly). Not installable
#     as-is — iOS enforces code-signature verification at install/launch time on real
#     devices, so whatever re-signs this IPA must apply a real signature first.
#   • screenshots/ + DeviceDNAApp.app.zip — simulator smoke-test, OPT-IN only (see below).
#
# NOTE: macOS runner minutes bill at 10x on private repos. Every push run only builds
# the device .ipa now — the simulator build+boot+screenshot stage roughly doubles
# per-run minutes and is redundant once real-device crash logs confirm the app installs
# and boots. Run it on demand via "Run workflow" with "Run simulator smoke test" checked
# when you actually need fresh screenshots (e.g. after a UI change).

name: iOS

on:
  workflow_dispatch:
    inputs:
      run_simulator_smoke_test:
        description: "Also build/boot the iOS Simulator and capture screenshots"
        type: boolean
        default: false
  push:
    branches: [master]
    paths:
      - "shared/**"
      - "ios/**"
      - "gradle/**"
      - "*.gradle.kts"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      # Kotlin/Native's own toolchain + platform libs (~200-500MB), downloaded once per
      # Kotlin version and otherwise re-fetched from scratch on every fresh runner.
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      # ── Stage 1: Kotlin/Native — the most likely failure point. Running it
      #    standalone gives clean Kotlin error logs instead of Xcode noise. ──
      - name: Compile Kotlin shared framework (iOS Simulator arm64)
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64 --console=plain

      # ── Stage 2: Xcode project + pods ──
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      # Firebase + AdMob + UMP are large XCFrameworks; `pod install` re-downloading and
      # re-processing them from scratch is one of the slowest steps in this workflow.
      # No Podfile.lock is committed (Pods/ is gitignored), so key on the Podfile itself.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Create iOS simulator
        if: github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        run: |
          set -euo pipefail
          RUNTIME_ID="$(xcrun simctl list runtimes --json | jq -r '[.runtimes[] | select(.isAvailable and (.identifier | contains("SimRuntime.iOS-"))) | .identifier] | last')"
          DEVICE_TYPE_ID="$(xcrun simctl list devicetypes --json | jq -r '[.devicetypes[] | select(.name == "iPhone 16") | .identifier] | first')"
          if [ "$RUNTIME_ID" = "null" ] || [ "$DEVICE_TYPE_ID" = "null" ]; then
            xcrun simctl list runtimes
            xcrun simctl list devicetypes
            exit 1
          fi
          SIMULATOR_UDID="$(xcrun simctl create "DeviceDNA CI iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID")"
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      # ── Stage 3: build the app for the simulator (no signing needed) ──
      - name: Build app for iOS Simulator
        if: github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace DeviceDNAApp.xcworkspace \
            -scheme DeviceDNAApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID,arch=arm64" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      # ── Stage 4: run it and photograph the result ──
      - name: Boot simulator, launch app, capture screenshots
        if: github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        run: |
          APP_PATH="ios/build/DerivedData/Build/Products/Debug-iphonesimulator/DeviceDNAApp.app"
          mkdir -p screenshots

          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"
          xcrun simctl launch "$SIMULATOR_UDID" com.devstdvad.devicedna

          sleep 15
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/01-first-frame.png
          sleep 10
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/02-settled.png

      - name: Upload screenshots
        if: always() && github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Zip and upload the simulator app bundle
        if: success() && github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        run: |
          cd ios/build/DerivedData/Build/Products/Debug-iphonesimulator
          zip -r "$GITHUB_WORKSPACE/DeviceDNAApp.app.zip" DeviceDNAApp.app

      - name: Upload app bundle
        if: success() && github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        uses: actions/upload-artifact@v4
        with:
          name: DeviceDNAApp-simulator
          path: DeviceDNAApp.app.zip

      # ── Stage 5: Kotlin/Native for the real-device target. Simulator (arm64 sim ABI)
      #    and device (arm64 device ABI) are compiled independently by Kotlin/Native, so
      #    this can surface errors the simulator compile didn't (isolate before the
      #    slower archive step, same reasoning as Stage 1). ──
      - name: Compile Kotlin shared framework (iOS device arm64)
        run: ./gradlew :shared:compileKotlinIosArm64 --console=plain

      # ── Stage 6: archive an UNSIGNED build for a real device (no Apple Developer
      #    account needed). AD_HOC/CODE_SIGNING flags disable every signing step so the
      #    archive step doesn't fail for lack of a team/certificate; the resulting .app
      #    has no signature at all and must be (re-)signed by whatever installs it. ──
      - name: Archive unsigned app for a real iOS device
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace DeviceDNAApp.xcworkspace \
            -scheme DeviceDNAApp \
            -configuration Debug \
            -destination "generic/platform=iOS" \
            -archivePath build/DeviceDNAApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive

      - name: Package unsigned .ipa
        if: success()
        run: |
          set -euo pipefail
          ARCHIVE_APP="ios/build/DeviceDNAApp.xcarchive/Products/Applications/DeviceDNAApp.app"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$ARCHIVE_APP" "$PAYLOAD_DIR/"
          (cd "$RUNNER_TEMP" && zip -r -y "$GITHUB_WORKSPACE/DeviceDNAApp-unsigned.ipa" Payload)

      - name: Upload unsigned .ipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DeviceDNAApp-unsigned-ipa
          path: DeviceDNAApp-unsigned.ipa

      # ── Stage 7: hand the .ipa to Telegram. Bot API caps bot-uploaded documents
      #    at 50 MB; if the archive is bigger, skip the send instead of failing the
      #    whole (already-green) build — the artifact is still on the Actions run. ──
      - name: Send .ipa to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          FILE="DeviceDNAApp-unsigned.ipa"
          MAX_BYTES=$((50 * 1024 * 1024))
          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")

          if [ "$SIZE" -gt "$MAX_BYTES" ]; then
            echo "::warning::$FILE is $SIZE bytes, over Telegram's 50 MB bot upload limit — skipping send. Download it from the workflow's artifacts instead."
            exit 0
          fi

          CAPTION="DeviceDNA iOS unsigned build
          Commit: ${GITHUB_SHA:0:7}
          Branch: ${GITHUB_REF_NAME}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          curl -sS -f \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${FILE}" \
            -F "caption=${CAPTION}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
