# iOS build for the Compose Multiplatform app.
#
# Produces artifacts you can inspect from any OS:
#   • DeviceDNAApp-unsigned.ipa  — UNSIGNED real-device build (arm64), for sideloading
#     tools that do their own signing (AltStore/AltServer, Sideloadly). Not installable
#     as-is — iOS enforces code-signature verification at install/launch time on real
#     devices, so whatever re-signs this IPA must apply a real signature first.
#   • screenshots/ + DeviceDNAApp.app.zip — simulator smoke-test, OPT-IN only (see below).
#
# NOTE: macOS runner minutes bill at 10x on private repos. Every push run only builds
# the device .ipa now — the simulator build+boot+screenshot stage roughly doubles
# per-run minutes and is redundant once real-device crash logs confirm the app installs
# and boots. Run it on demand via "Run workflow" with "Run simulator smoke test" checked
# when you actually need fresh screenshots (e.g. after a UI change).

name: iOS

on:
  workflow_dispatch:
    inputs:
      run_simulator_smoke_test:
        description: "Also build/boot the iOS Simulator and capture screenshots"
        type: boolean
        default: false
  push:
    branches: [master]
    paths:
      - "shared/**"
      - "ios/**"
      - "gradle/**"
      - "*.gradle.kts"
      - ".github/workflows/ios.yml"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ios/project.yml `include:`s ios/settings.local.yml (bundle ids, SYNC_BASE_URL,
      # AdMob unit ids, CFG_*), which sync-config.sh renders from the gitignored
      # secrets.properties. No fallback: a placeholder SYNC_BASE_URL would produce an
      # .ipa that installs, launches and silently fails every backend call.
      - name: Render generated config from secrets.properties
        env:
          SECRETS_PROPERTIES_B64: ${{ secrets.SECRETS_PROPERTIES_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$SECRETS_PROPERTIES_B64" ]; then
            echo "::error::Repository secret SECRETS_PROPERTIES_BASE64 is not set. Create it from your local file: base64 -i secrets.properties | tr -d '\n'"
            exit 1
          fi
          printf '%s' "$SECRETS_PROPERTIES_B64" | base64 --decode > secrets.properties
          ./scripts/sync-config.sh

      # The Firebase plists hold real keys, so they are gitignored (not in the checkout).
      # Materialize them before xcodegen/xcodebuild: from a base64 secret when configured
      # (real Firebase), otherwise from the committed placeholder template so the unsigned
      # build stays green (Firebase is simply inactive in that artifact).
      - name: Provide Firebase plists
        working-directory: ios/DeviceDNAApp
        env:
          GOOGLE_SERVICE_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_PLIST_BASE64 }}
          CFG_SYNC_PLIST_B64: ${{ secrets.IOS_CFG_SYNC_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          write_plist () {
            local secret="$1" dest="$2"
            if [ -n "$secret" ]; then
              printf '%s' "$secret" | base64 --decode > "$dest"
              echo "Wrote $dest from secret."
            else
              cp GoogleService-Info.plist.example "$dest"
              echo "::warning::$dest came from the placeholder template — Firebase is INACTIVE in this build, so Google/Apple sign-in will fail with \"not configured\". Set the matching base64 secret to fix."
            fi
          }
          write_plist "$GOOGLE_SERVICE_PLIST_B64" GoogleService-Info.plist
          write_plist "$CFG_SYNC_PLIST_B64" GoogleService-Info-CfgSync.plist

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      # Kotlin/Native's own toolchain + platform libs (~200-500MB), downloaded once per
      # Kotlin version and otherwise re-fetched from scratch on every fresh runner.
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Select current App Store Xcode toolchain
        run: |
          set -euo pipefail
          XCODE_APP="$(find /Applications -maxdepth 1 -type d -name 'Xcode_26*.app' | sort | tail -1)"
          if [ -z "$XCODE_APP" ]; then
            echo "::error::Xcode 26 is required for App Store submissions after April 28, 2026."
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      # ── Stage 1: Kotlin/Native — the most likely failure point. Running it
      #    standalone gives clean Kotlin error logs instead of Xcode noise. ──
      - name: Compile Kotlin shared framework (iOS Simulator arm64)
        run: ./gradlew :shared:compileKotlinIosSimulatorArm64 --console=plain

      # ── Stage 2: Xcode project + pods ──
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      # Firebase + AdMob + UMP are large XCFrameworks; `pod install` re-downloading and
      # re-processing them from scratch is one of the slowest steps in this workflow.
      # No Podfile.lock is committed (Pods/ is gitignored), so key on the Podfile itself.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Create iOS simulator
        if: github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        run: |
          set -euo pipefail
          RUNTIME_ID="$(xcrun simctl list runtimes --json | jq -r '[.runtimes[] | select(.isAvailable and (.identifier | contains("SimRuntime.iOS-"))) | .identifier] | last')"
          DEVICE_TYPE_ID="$(xcrun simctl list devicetypes --json | jq -r '[.devicetypes[] | select(.name == "iPhone 16") | .identifier] | first')"
          if [ "$RUNTIME_ID" = "null" ] || [ "$DEVICE_TYPE_ID" = "null" ]; then
            xcrun simctl list runtimes
            xcrun simctl list devicetypes
            exit 1
          fi
          SIMULATOR_UDID="$(xcrun simctl create "DeviceDNA CI iPhone" "$DEVICE_TYPE_ID" "$RUNTIME_ID")"
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      # ── Stage 3: build the app for the simulator (no signing needed) ──
      - name: Build app for iOS Simulator
        if: github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace DeviceDNAApp.xcworkspace \
            -scheme DeviceDNAApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID,arch=arm64" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      # ── Stage 4: run it and photograph the result ──
      - name: Boot simulator, launch app, capture screenshots
        if: github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        run: |
          APP_PATH="ios/build/DerivedData/Build/Products/Debug-iphonesimulator/DeviceDNAApp.app"
          mkdir -p screenshots

          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"
          APP_BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"
          xcrun simctl launch "$SIMULATOR_UDID" "$APP_BUNDLE_ID"

          sleep 15
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/01-first-frame.png
          sleep 10
          xcrun simctl io "$SIMULATOR_UDID" screenshot screenshots/02-settled.png

      - name: Upload screenshots
        if: always() && github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: ignore

      - name: Zip and upload the simulator app bundle
        if: success() && github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        run: |
          cd ios/build/DerivedData/Build/Products/Debug-iphonesimulator
          zip -r "$GITHUB_WORKSPACE/DeviceDNAApp.app.zip" DeviceDNAApp.app

      - name: Upload app bundle
        if: success() && github.event_name == 'workflow_dispatch' && inputs.run_simulator_smoke_test
        uses: actions/upload-artifact@v4
        with:
          name: DeviceDNAApp-simulator
          path: DeviceDNAApp.app.zip

      # ── Stage 5: Kotlin/Native for the real-device target. Simulator (arm64 sim ABI)
      #    and device (arm64 device ABI) are compiled independently by Kotlin/Native, so
      #    this can surface errors the simulator compile didn't (isolate before the
      #    slower archive step, same reasoning as Stage 1). ──
      - name: Compile Kotlin shared framework (iOS device arm64)
        run: ./gradlew :shared:compileKotlinIosArm64 --console=plain

      # ── Stage 6: archive an UNSIGNED build for a real device (no Apple Developer
      #    account needed). AD_HOC/CODE_SIGNING flags disable every signing step so the
      #    archive step doesn't fail for lack of a team/certificate; the resulting .app
      #    has no signature at all and must be (re-)signed by whatever installs it. ──
      - name: Archive unsigned app for a real iOS device
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace DeviceDNAApp.xcworkspace \
            -scheme DeviceDNAApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/DeviceDNAApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            IOS_USE_REAL_BILLING=NO \
            archive

      - name: Verify AdMob in archived app
        run: |
          set -euo pipefail
          APP="ios/build/DeviceDNAApp.xcarchive/Products/Applications/DeviceDNAApp.app"
          PLIST="$APP/Info.plist"

          require_plist_value () {
            local key="$1"
            local value
            value="$(/usr/libexec/PlistBuddy -c "Print :$key" "$PLIST" 2>/dev/null || true)"
            if [ -z "$value" ] || [[ "$value" == *'$('* ]] || [[ "$value" == *'YOUR_'* ]]; then
              echo "::error::$key is missing or unresolved in the archived app."
              exit 1
            fi
            echo "$key is configured."
          }

          require_plist_value GADApplicationIdentifier
          require_plist_value AdMobBannerAdUnitId
          require_plist_value AdMobInterstitialAdUnitId

          grep -q 'Google-Mobile-Ads-SDK' ios/Podfile.lock || {
            echo "::error::Google Mobile Ads SDK is missing from Podfile.lock."
            exit 1
          }
          grep -q 'GoogleUserMessagingPlatform' ios/Podfile.lock || {
            echo "::error::Google UMP SDK is missing from Podfile.lock."
            exit 1
          }

          # Google Mobile Ads and UMP can be statically linked from their vendored
          # XCFrameworks, so they are not guaranteed to appear as standalone folders
          # under App.app/Frameworks. The successful Swift compile/link verifies the
          # SDKs; print dynamically embedded frameworks only as diagnostics.
          echo "Dynamically embedded frameworks:"
          find "$APP/Frameworks" -maxdepth 1 -type d -name '*.framework' -print 2>/dev/null || true

      - name: Package unsigned .ipa
        if: success()
        run: |
          set -euo pipefail
          ARCHIVE_APP="ios/build/DeviceDNAApp.xcarchive/Products/Applications/DeviceDNAApp.app"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$ARCHIVE_APP" "$PAYLOAD_DIR/"
          (cd "$RUNNER_TEMP" && zip -r -y "$GITHUB_WORKSPACE/DeviceDNAApp-unsigned.ipa" Payload)

      - name: Upload unsigned .ipa
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DeviceDNAApp-unsigned-ipa
          path: DeviceDNAApp-unsigned.ipa

      # ── Stage 7: hand the .ipa to Telegram. Bot API caps bot-uploaded documents
      #    at 50 MB; if the archive is bigger, skip the send instead of failing the
      #    whole (already-green) build — the artifact is still on the Actions run. ──
      - name: Send .ipa to Telegram
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          FILE="DeviceDNAApp-unsigned.ipa"
          MAX_BYTES=$((50 * 1024 * 1024))
          SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")

          if [ "$SIZE" -gt "$MAX_BYTES" ]; then
            echo "::warning::$FILE is $SIZE bytes, over Telegram's 50 MB bot upload limit — skipping send. Download it from the workflow's artifacts instead."
            exit 0
          fi

          CAPTION="DeviceDNA iOS unsigned build
          Commit: ${GITHUB_SHA:0:7}
          Branch: ${GITHUB_REF_NAME}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          HTTP_STATUS=$(curl -sS -o response.json -w "%{http_code}" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "document=@${FILE}" \
            -F "caption=${CAPTION}" \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument")

          cat response.json
          echo

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Telegram API returned HTTP $HTTP_STATUS — see response body above for the exact 'description' field."
            exit 1
          fi
