# XcodeGen spec — generates DeviceDNAApp.xcodeproj reproducibly (locally and on CI).
#   brew install xcodegen && cd ios && xcodegen generate && pod install
# The Kotlin Multiplatform framework is compiled by the pre-build script phase below;
# CocoaPods only supplies Firebase/GoogleSignIn/AdMob.

name: DeviceDNAApp

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    IOS_APP_BUNDLE_ID: com.example.devicedna
    IOS_WIDGET_BUNDLE_ID: com.example.devicedna.widgets
    IOS_APP_GROUP_ID: group.com.example.devicedna
    IOS_BACKGROUND_TASK_ID: com.example.devicedna.refresh
    IOS_DEEP_LINK_SCHEME: devicedna
    # Must match REVERSED_CLIENT_ID in DeviceDNAApp/GoogleService-Info.plist —
    # registers the OAuth redirect URL scheme Google Sign-In needs at runtime.
    GOOGLE_REVERSED_CLIENT_ID: com.googleusercontent.apps.871047083437-4rj58iqogjt6jv6tj3478bu15emk0fb9
    IOS_STOREKIT_PREMIUM_PRODUCT_ID: YOUR_IOS_STOREKIT_PREMIUM_PRODUCT_ID
    # Google's official test IDs (safe for dev/testing — always serve test ads,
    # never earn revenue). Replace with real AdMob console values before release.
    IOS_ADMOB_APP_ID: ca-app-pub-3940256099942544~1458002511
    IOS_ADMOB_BANNER_AD_UNIT_ID: ca-app-pub-3940256099942544/2934735716
    IOS_ADMOB_INTERSTITIAL_AD_UNIT_ID: ca-app-pub-3940256099942544/4411468910
    # Must match Android's syncBaseUrl (local.properties) — same Cloudflare Worker backend.
    SYNC_BASE_URL: https://devicedna-sync.ravehent.workers.dev
    # Remote config. Public key (raw32 base64) is not secret. CFG_DOC_PATH must match Android.
    CFG_PUBKEY: e29neD6eZhhbkr1ZJDCOUfw4ylXttEOaaBnW5qMGAxc=
    CFG_DOC_PATH: cfg/state
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  DeviceDNAApp:
    type: application
    platform: iOS
    sources:
      - path: DeviceDNAApp
        excludes:
          - "Info.plist"
          - "GoogleService-Info.plist"
      # XcodeGen doesn't reliably add non-Info.plist *.plist files under a `sources`
      # path to Copy Bundle Resources (yonaskolb/XcodeGen#1423) — without this explicit
      # entry, GoogleService-Info.plist silently never ships in the .app bundle, so
      # `Bundle.main.path(forResource:ofType:)` returns nil, FirebaseApp.configure()
      # never runs, and GIDSignIn.sharedInstance.configuration never gets set —
      # producing the exact same "no active configuration" NSException as before that
      # fix was written, since the code path was simply never reached at runtime.
      - path: DeviceDNAApp/GoogleService-Info.plist
        buildPhase: resources
      # Secondary Firebase plist. Uncomment once DeviceDNAApp/GoogleService-Info-CfgSync.plist exists
      # (XcodeGen fails on a missing path) so it ships in the bundle like the primary plist.
      - path: DeviceDNAApp/GoogleService-Info-CfgSync.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(IOS_APP_BUNDLE_ID)
        INFOPLIST_FILE: DeviceDNAApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: DeviceDNAApp/DeviceDNAApp.entitlements
        # Cloudflare Worker sync backend (no trailing slash), read by Info.plist's
        # SyncBaseUrl key via $(SYNC_BASE_URL) substitution — see DeviceDNAApp.swift's
        # AppConfig.syncBaseUrl. Must match Android's `syncBaseUrl` (local.properties /
        # -PsyncBaseUrl, see android/build.gradle.kts). Deliberately a plain build
        # setting rather than a separate xcconfig via `configFiles:` — that approach
        # replaced the target's CocoaPods-managed base xcconfig wholesale, breaking
        # PODS_ROOT and every Pods embed-frameworks/resources file list.
        # Kotlin Multiplatform framework produced by :shared:embedAndSignAppleFrameworkForXcode
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "shared"
    preBuildScripts:
      - name: Build Kotlin shared framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
    dependencies:
      - target: DeviceDNAWidgets
        embed: true
    scheme:
      testTargets: []
      gatherCoverageData: false

  DeviceDNAWidgets:
    type: app-extension
    platform: iOS
    # containerBackground(for:) in the widget views requires iOS 17.
    deploymentTarget: "17.0"
    sources:
      - path: DeviceDNAWidgets
    info:
      path: DeviceDNAWidgets/Info.plist
      properties:
        CFBundleDisplayName: DeviceDNA Widgets
        AppGroupId: $(IOS_APP_GROUP_ID)
        DeepLinkScheme: $(IOS_DEEP_LINK_SCHEME)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(IOS_WIDGET_BUNDLE_ID)
        CODE_SIGN_ENTITLEMENTS: DeviceDNAWidgets/DeviceDNAWidgets.entitlements
        SKIP_INSTALL: true
