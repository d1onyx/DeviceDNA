# XcodeGen spec — generates DeviceDNAApp.xcodeproj reproducibly (locally and on CI).
#   brew install xcodegen && cd ios && xcodegen generate && pod install
# The Kotlin Multiplatform framework is compiled by the pre-build script phase below;
# CocoaPods only supplies Firebase/GoogleSignIn/AdMob.

name: DeviceDNAApp

# Every account-specific build setting (bundle ids, AdMob unit ids, SYNC_BASE_URL,
# GOOGLE_REVERSED_CLIENT_ID) lives in the repo-root secrets.properties and is
# rendered into settings.local.yml. That file is gitignored — generate it before
# `xcodegen generate`, otherwise this include fails:
#     ./scripts/sync-config.sh
include:
  - settings.local.yml

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  DeviceDNAApp:
    type: application
    platform: iOS
    sources:
      - path: DeviceDNAApp
        excludes:
          - "Info.plist"
          - "GoogleService-Info.plist"
          - "PrivacyInfo.xcprivacy"
      - path: DeviceDNAApp/GoogleService-Info.plist
        buildPhase: resources
        optional: true
      - path: DeviceDNAApp/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(IOS_APP_BUNDLE_ID)
        INFOPLIST_FILE: DeviceDNAApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: DeviceDNAApp/DeviceDNAApp.entitlements
        # Cloudflare Worker sync backend (no trailing slash), read by Info.plist's
        # SyncBaseUrl key via $(SYNC_BASE_URL) substitution — see DeviceDNAApp.swift's
        # AppConfig.syncBaseUrl. Shares Android's `syncBaseUrl` via secrets.properties
        # (see android/build.gradle.kts). Deliberately a plain build
        # setting rather than a separate xcconfig via `configFiles:` — that approach
        # replaced the target's CocoaPods-managed base xcconfig wholesale, breaking
        # PODS_ROOT and every Pods embed-frameworks/resources file list.
        # Kotlin Multiplatform framework produced by :shared:embedAndSignAppleFrameworkForXcode
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework"
          - "shared"
    preBuildScripts:
      - name: Build Kotlin shared framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
    dependencies:
      - target: DeviceDNAWidgets
        embed: true
    scheme:
      testTargets: []
      gatherCoverageData: false

  DeviceDNAWidgets:
    type: app-extension
    platform: iOS
    # containerBackground(for:) in the widget views requires iOS 17.
    deploymentTarget: "17.0"
    sources:
      - path: DeviceDNAWidgets
        excludes:
          - "PrivacyInfo.xcprivacy"
      - path: DeviceDNAWidgets/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: DeviceDNAWidgets/Info.plist
      properties:
        CFBundleDisplayName: DeviceDNA Widgets
        AppGroupId: $(IOS_APP_GROUP_ID)
        DeepLinkScheme: $(IOS_DEEP_LINK_SCHEME)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(IOS_WIDGET_BUNDLE_ID)
        CODE_SIGN_ENTITLEMENTS: DeviceDNAWidgets/DeviceDNAWidgets.entitlements
        SKIP_INSTALL: true
