# ─────────────────────────────────────────────────────────────────────────────
# Account-specific values to change during migration are marked [MIGRATE].
# Full checklist: ../MIGRATION.md
# ─────────────────────────────────────────────────────────────────────────────

# [MIGRATE] (optional) worker name — affects the URL <name>.<subdomain>.workers.dev
name = "devicedna-sync"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# Public (non-secret) variables
[vars]
# [MIGRATE] MUST match the app's Firebase project_id (android/google-services.json).
# Otherwise ID token verification will fail.
FIREBASE_PROJECT_ID = "YOUR_FIREBASE_PROJECT_ID"
PUBLIC_JWK_CACHE_KEY = "firebase-public-jwk"
GOOGLE_PLAY_PACKAGE_NAME = "com.devstdvad.devicedna"
GOOGLE_PLAY_PREMIUM_PRODUCT_ID = "devicedna_premium"

# [MIGRATE] KV namespace for caching Google's public keys (JWKS).
# The id is obtained via:  wrangler kv namespace create PUBLIC_JWK_CACHE_KV
# (or automatically via ./setup-cloudflare.sh)
[[kv_namespaces]]
binding = "PUBLIC_JWK_CACHE_KV"
id = "REPLACE_AFTER_wrangler_kv_namespace_create"

# [MIGRATE] The DATABASE_URL (Neon) secret is set separately, NOT here:
#   wrangler secret put DATABASE_URL

# Optional: set when using /internal subscription upserts:
#   wrangler secret put INTERNAL_API_KEY

# Required for real Google Play subscription verification:
#   wrangler secret put GOOGLE_PLAY_SERVICE_ACCOUNT_EMAIL
#   wrangler secret put GOOGLE_PLAY_PRIVATE_KEY

# Local/dev only: set DEV_SUBSCRIPTIONS_ENABLED="true" (in .dev.vars) to allow
# POST /v1/subscription/dev/activate to grant a 10-minute Premium subscription.
# Leave unset in production.
